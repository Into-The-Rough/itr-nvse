[Tweaks]
; Auto-enable god mode on new game/load (default: 0)
bAutoGodMode=0

; Auto-load quicksave when reaching start menu (default: 0)
bAutoQuickLoad=0

; Quick close message boxes with Enter/Space key (default: 1)
bMessageBoxQuickClose=1

; Delete console log on startup (default: 1)
bConsoleLogCleaner=1

; Mute audio when alt-tabbing (default: 1)
bAltTabMute=1

; Drop weapon with modifier+ready weapon key (default: 0)
bQuickDrop=0

; 180 degree turn with modifier+run key (default: 0)
bQuick180=0

; Fix physics explosion in extreme slow motion (default: 1)
bSlowMotionPhysicsFix=1

; Fix explosive pants/held items detonating on holder (default: 0)
bExplodingPantsFix=0

; Show file size in save/load menu (default: 1)
bSaveFileSize=1

; Show owner name on crosshair prompt (default: 0)
bOwnerNameInfo=0

; Prevent XP from kill command on already-dead actors (default: 1)
bKillActorXPFix=1

; No karma loss when reverse pickpocketing non-explosives (default: 0)
bReversePickpocketNoKarma=0

; Fix projectile hit chance in VATS (default: 1)
bVATSProjectileFix=1

; Hide dismembered limbs in VATS (default: 0)
bVATSLimbFix=0

; Allow sleeping in owned beds with consequences (default: 0)
bOwnedBeds=0

; Show original NPC name for ash piles (default: 0)
bAshPileNames=0

; Show popup when revisiting discovered locations (default: 0)
bLocationVisitPopup=0

; Extend VATS target highlighting limit (default: 0)
bVATSExtender=0

; Convert quest objectives popup to corner message (default: 0)
bSuppressObjectives=0

; Convert reputation change popup to corner message (default: 0)
bSuppressReputation=0

; NPCs can now hurt each other with non-explosive weapons. (default: 0)
bFriendlyFire=0

; Skip actor fade-out when entering doors (default: 0)
bNoDoorFade=0

; Fix NPC armor DT/DR not updating on equip (default: 1)
bArmorDTDRFix=1

; Quick view notes and play holotapes on pickup (default: 0)
bQuickReadNote=0

; Companions killing faction members doesn't give player infamy (default: 0)
bCompanionNoInfamy=0

; Fix crash in BuildFollowerListRecursive - missing null check on GetCurrentPackage (default: 1)
bDetectionFollowerCrashFix=1

; Scale inline SUActn button glyphs (&-sUActn...;) to the owning tile's font and zoom
; so they match surrounding text size (fixes oversize icons in ELMO, B42 Notify,
; Smooth Notifications). Vanilla messageboxes are unaffected. (default: 0)
bInlineGlyphFix=0

; Visual size percent for inline button glyphs after font/zoom scaling.
; Lower if icons look too large, raise if they look too small. Layout/advance is unaffected. (default: 88)
iInlineGlyphVisualScalePercent=88

; Prevent voice/dialogue from slowing down during VATS (default: 0)
bVATSSpeechFix=0

; Fix NPCs with lock/unlock packages locking doors in cells they don't own (default: 1)
bDoorPackageOwnershipFix=1

; 0=vanilla, 1=only direct door owners bypass locks, 2=must use key/lockpicks (default: 0)
iNPCDoorUnlockBlock=0

; Fix stimpak timer using wrong game setting (default: 1)
bCombatItemTimerFix=1

; NPCs use antidotes when poisoned during combat (default: 0)
bNPCAntidoteUse=0

; NPCs use doctor's bags when crippled in combat (default: 0)
bNPCDoctorsBagUse=0

; Fix crash from null actor in pathing code (default: 1)
bPathingNullActorFix=1

; Fix crash in NavMesh info processing (default: 1)
bNavMeshInfoCrashFix=1

; Fix crash during Havok physics initialization (default: 1)
bInitHavokCrashFix=1

; Reset music state when loading a save (default: 1)
bMusicResetOnLoad=1

; Looting owned corpses counts as stealing (default: 0)
bOwnedCorpses=0

[AutoQuickLoad]
; Delay in milliseconds before loading - gives startup scripts time to initialize (default: 1500)
; Mods using GetGameRestarted+CallAfterSeconds need ~1500ms. Set to 0 for instant load.
iDelayMs=1500

[QuickDrop]
; Modifier key (VK code, 0=none, 16=Shift, 17=Ctrl, 18=Alt)
iModifierKey=16
; Control ID to combine with modifier (7=Ready Weapon)
iControlID=7

[Quick180]
; Modifier key (VK code, 0=none, 16=Shift, 17=Ctrl, 18=Alt)
iModifierKey=16
; Control ID to combine with modifier (5=Run)
iControlID=5

[OwnerNameInfo]
; Use "Item (Owner)" format instead of "Owner's Item" (default: 1)
bCompatibilityMode=1
; Show faction ownership (default: 1)
bShowFactionName=1
; Only show owner when taking would be a crime (default: 1)
bShowNameOnlyCrime=1

[LocationVisitPopup]
; Cooldown in seconds before showing popup for same location again (default: 300)
; Set to 0 to show popup every time you enter a location
iCooldownSeconds=300
; Disable the discovery sound jingle (default: 0)
bDisableSound=0

[QuickReadNote]
; Time in milliseconds the prompt remains active after picking up a note (default: 5000)
iTimeoutMs=5000
; Control ID that triggers quick view (6=Aim/Block, see GECK control IDs)
iControlID=6
; Max lines before truncating (0=auto-calculate from screen height)
iMaxLines=0

[Events]
; Maximum time in milliseconds between presses to count as a double tap (default: 300)
iDoubleTapThresholdMs=300
; Time in milliseconds a key must be held before firing held events (default: 500)
iKeyHeldThresholdMs=500
; Repeat interval in milliseconds for held key events after the initial trigger (default: 250)
iKeyHeldRepeatMs=250

[NPCAntidoteUse]
; Cooldown in seconds between antidote uses (default: 10)
iCureTimer=10
; Skip cure if health below this percent (default: 25)
iHealthThreshold=25

[NPCDoctorsBagUse]
; Cooldown in seconds between doctor's bag uses (default: 15)
iUseTimer=15

[OnWitnessed]
; Minimum detection value (-100..500) for the trespass witness scan (default: 25)
iDetectionThreshold=25
; Radius in game units for the trespass witness scan (default: 2048)
iSearchRadius=2048
