[Tweaks]
; Auto-enable god mode on new game/load (default: 0)
bAutoGodMode=0

; Auto-load quicksave when reaching start menu (default: 0)
bAutoQuickLoad=0

; Quick close message boxes with Enter/Space key (default: 1)
bMessageBoxQuickClose=1

; Delete console log on startup (default: 1)
bConsoleLogCleaner=1

; Mute audio when alt-tabbing (default: 1)
bAltTabMute=1

; Drop weapon with modifier+ready weapon key (default: 0)
bQuickDrop=0

; 180 degree turn with modifier+run key (default: 0)
bQuick180=0

; Fix physics explosion in extreme slow motion (default: 1)
bSlowMotionPhysicsFix=1

; Fix explosive pants/held items detonating on holder (default: 1)
bExplodingPantsFix=1

; Show file size in save/load menu (default: 1)
bSaveFileSize=1

; Show owner name on crosshair prompt (default: 1)
bOwnerNameInfo=1

; Fix projectile hit chance in VATS (default: 1)
bVATSProjectileFix=1

; Hide dismembered limbs in VATS (default: 0)
bVATSLimbFix=0

[AutoQuickLoad]
; Number of frames to wait on start menu before loading quicksave (default: 5)
iFrameDelay=5

[QuickDrop]
; Modifier key (VK code, 0=none, 16=Shift, 17=Ctrl, 18=Alt)
iModifierKey=16
; Control ID to combine with modifier (7=Ready Weapon)
iControlID=7

[Quick180]
; Modifier key (VK code, 0=none, 16=Shift, 17=Ctrl, 18=Alt)
iModifierKey=16
; Control ID to combine with modifier (5=Run)
iControlID=5

[OwnerNameInfo]
; Use "Item (Owner)" format instead of "Owner's Item" (default: 0)
bCompatibilityMode=0
; Show faction ownership (default: 1)
bShowFactionName=1
